<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>振ったら音が鳴る</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>スマホを振って音を鳴らそう</h1>
    <p>画面を振ると選んだ音声が再生されます。</p>

    <div class="card">
      <label for="soundSelect">再生する音を選ぶ</label>
      <select id="soundSelect">
        <option value="ガラスが割れる2.mp3">ガラスが割れる</option>
        <option value="パンチの素振り1.mp3">パンチの素振り</option>
        <option value="パンチ素振り (1).mp3">パンチ素振り (1)</option>
        <option value="ロボットを強く殴る2.mp3">ロボットを強く殴る</option>
        <option value="刀で斬る2.mp3">刀で斬る</option>
        <option value="剣で斬る2.mp3">剣で斬る</option>
        <option value="打撃1.mp3">打撃</option>
        <option value="盾で防御.mp3">盾で防御</option>
        <option value="重いパンチ2.mp3">重いパンチ</option>
      </select>
    </div>

    <div class="card">
      <button id="permissionButton">振動許可を求める</button>
      <p class="help-text">iOS では最初に許可が必要です。</p>
    </div>

    <div class="card status-card">
      <p id="status">準備OKです。スマホを振ってください。</p>
    </div>

    <div class="card debug-card">
      <label>
        <input type="checkbox" id="debugToggle" />
        デバッグモード（加速度をリアルタイム表示）
      </label>
      <div id="debugInfo" style="display: none; margin-top: 1rem; font-family: monospace; font-size: 0.9rem; background: rgba(0,0,0,0.3); padding: 0.75rem; border-radius: 8px;">
        <div>X: <span id="accelX">0.00</span></div>
        <div>Y: <span id="accelY">0.00</span></div>
        <div>Z: <span id="accelZ">0.00</span></div>
        <div style="margin-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 0.5rem;">
          大きさ: <span id="magnitude">0.00</span> (閾値: <span id="thresholdValue">15</span>)
        </div>
        <div id="shakeDetected" style="margin-top: 0.5rem; color: #58a6ff;"></div>
      </div>
    </div>
  </main>

  <audio id="audioPlayer" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
